name: Deploy náhľad (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Viac pokusov denne – feed CK DAKA býva občas chvíľu nedostupný,
    # stačí keď jeden z pokusov stiahne čerstvé dáta (časy v UTC).
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

# povolíme len jeden súbežný deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inštalácia závislostí
        run: npm ci

      - name: Build statickej verzie (stiahne feed alebo použije vzorku)
        run: npm run build:static
        env:
          REQUIRE_LIVE: "1"

      - name: Ulož zálohu dát do repozitára (ak sa zmenila)
        id: backup
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain data/last-good.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/last-good.json
            git commit -m "chore: aktualizácia zálohy dát [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Záloha sa nezmenila – netreba commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: IndexNow – oznámenie vyhľadávačom (Bing, Seznam, Yandex)
        # Pri merge/dispatch vždy; pri dennom crone len keď sa dáta naozaj zmenili
        # (nepingujeme zbytočne 5× denne rovnaký zoznam).
        if: github.ref == 'refs/heads/main' && (github.event_name != 'schedule' || steps.backup.outputs.changed == 'true')
        continue-on-error: true
        run: node scripts/indexnow.js
        env:
          SITE_URL: "https://vyber.ckdaka.sk"

      - name: Konfigurácia Pages
        # Pozn.: Pages treba v repozitári raz manuálne zapnúť
        # (Settings → Pages → Build and deployment → Source: "GitHub Actions").
        # Token v Actions nemá právo zapnúť Pages automaticky.
        uses: actions/configure-pages@v5

      - name: Upload artefaktu
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
