name: Deploy náhľad (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # automatická denná aktualizácia ponuky (03:00 UTC ≈ 04:00/05:00 SEČ)
    # Pozn.: plánované spustenie beží len z predvolenej vetvy (main).
    - cron: "0 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

# povolíme len jeden súbežný deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inštalácia závislostí
        run: npm ci

      - name: Build statickej verzie (stiahne feed alebo použije vzorku)
        run: npm run build:static
        env:
          REQUIRE_LIVE: "1"

      - name: Ulož zálohu dát do repozitára (ak sa zmenila)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain data/last-good.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/last-good.json
            git commit -m "chore: aktualizácia zálohy dát [skip ci]"
            git push
          else
            echo "Záloha sa nezmenila – netreba commit."
          fi

      - name: Konfigurácia Pages
        # Pozn.: Pages treba v repozitári raz manuálne zapnúť
        # (Settings → Pages → Build and deployment → Source: "GitHub Actions").
        # Token v Actions nemá právo zapnúť Pages automaticky.
        uses: actions/configure-pages@v5

      - name: Upload artefaktu
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
